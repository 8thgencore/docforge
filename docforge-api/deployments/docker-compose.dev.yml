services:
  api:
    build:
      context: .
      target: runtime
    container_name: docforge-dev-api
    restart: unless-stopped
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    command:
      [
        "/bin/sh",
        "-c",
        "PYTHONPATH=/usr/src/app/src python -m uvicorn docforge.main:app --host 0.0.0.0 --port 8000 --reload",
      ]
    ports:
      - "38000:8000"
    volumes:
      - ./:/usr/src/app
    networks:
      - docforge_dev_net

  worker:
    build:
      context: .
      target: runtime
    container_name: docforge-dev-worker
    restart: unless-stopped
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    command: ["/bin/sh", "-c", "PYTHONPATH=/usr/src/app/src python -m docforge.tasks.worker"]
    volumes:
      - ./:/usr/src/app
    networks:
      - docforge_dev_net

  db:
    image: postgres:17.7-alpine
    container_name: docforge-dev-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: "${DB_NAME}"
      POSTGRES_USER: "${DB_USER}"
      POSTGRES_PASSWORD: "${DB_PASSWORD}"
    ports:
      - "35432:5432"
    volumes:
      - postgres_volume:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 1s
      timeout: 5s
      retries: 5
    networks:
      - docforge_dev_net

  redis:
    image: redis:8.2-alpine
    container_name: docforge-dev-redis
    command:
      - /bin/sh
      - -c
      - |
          redis-server \
            --requirepass "$${REDIS_PASSWORD:?REDIS_PASSWORD variable is not set}" \
            --maxmemory 450mb \
            --maxmemory-policy allkeys-lru
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
    environment:
      ALLOW_EMPTY_PASSWORD: "no"
      REDIS_PASSWORD: "${REDIS_PASSWORD}"
    ports:
      - "36379:6379"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping"]
      interval: 1s
      timeout: 3s
      retries: 30
    networks:
      - docforge_dev_net

  qdrant:
    image: qdrant/qdrant:v1.16
    container_name: docforge-dev-qdrant
    restart: unless-stopped
    ports:
      - "36333:6333"
    volumes:
      - qdrant_volume:/qdrant/storage
    networks:
      - docforge_dev_net

volumes:
  postgres_volume:
    name: docforge_dev_postgres_volume
  qdrant_volume:
    name: docforge_dev_qdrant_volume

networks:
  docforge_dev_net:
    name: docforge_dev_net
    driver: bridge
    ipam:
      config:
        - subnet: ${DOCKER_DEV_SUBNET:-172.30.20.0/24}
